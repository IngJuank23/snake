<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snake Retro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1>Snake Retro</h1>

      <!-- Configuración -->
      <section class="card">
        <h2>Configuración</h2>
        <label>Nombre
          <input id="name" type="text" maxlength="18" placeholder="Jugador" />
        </label>
        <label>Volumen música
          <input id="volume" type="range" min="0" max="1" step="0.01" value="0.35" />
        </label>
        <div class="buttons">
          <button id="startBtn">▶ Start</button>
          <button id="resetBtn" class="secondary">⟲ Reiniciar</button>
          <button id="pauseBtn" class="secondary">⏸ Pausa (P)</button>
        </div>
      </section>

      <!-- Progreso de nivel -->
      <section class="card" id="progressCard">
        <h2>Progreso</h2>
        <div class="level-info">
          <span id="levelLabel">Nivel —</span>
          <span id="levelTheme" style="font-size:12px">—</span>
        </div>
        <div class="progress-bar-wrap">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="progress-labels">
          <span id="progressFoods"></span>
          <span id="progressTime"></span>
        </div>
        <div id="activePUCard" class="active-pu" style="display:none"></div>
      </section>

      <!-- Leaderboard -->
      <section class="card">
        <div class="tabs">
          <button id="tabDur" class="tab active">Duración</button>
          <button id="tabPts" class="tab">Puntos</button>
        </div>
        <ol id="leaderboard" class="leaderboard"></ol>
      </section>

      <footer>
        <small id="attribution">
          Developed by <strong>JuanPariona©</strong> │ 2025 │ v3.0
        </small>
      </footer>
    </aside>

    <main class="stage-wrap">
      <canvas id="stage" width="960" height="960"></canvas>
      <div id="overlay" class="overlay"></div>
      <!-- D‑pad táctil -->
      <div id="pad" aria-label="Controles táctiles" role="group">
        <button class="pad-btn" data-dir="up"    aria-label="Arriba">▲</button>
        <div class="pad-row">
          <button class="pad-btn" data-dir="left"  aria-label="Izquierda">◀</button>
          <button class="pad-btn" id="pad-pause"   aria-label="Pausa/Reanudar">⏯</button>
          <button class="pad-btn" data-dir="right" aria-label="Derecha">▶</button>
        </div>
        <button class="pad-btn" data-dir="down"  aria-label="Abajo">▼</button>
      </div>
    </main>
  </div>

  <audio id="bgm" preload="auto" loop>
    <source src="assets/music.ogg" type="audio/ogg" />
    <source src="assets/music.mp3" type="audio/mpeg" />
  </audio>
  <script defer src="snake.js"></script>
</body>
</html>
