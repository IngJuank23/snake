<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Snake Retro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">

      <!-- HEADER -->
      <div class="sidebar-header">
        <h1>🐍 Snake Retro</h1>
        <span class="version-badge">v3.0</span>
      </div>

      <!-- CONFIGURACIÓN -->
      <section class="card">
        <div class="card-header">
          <h2>Configuración</h2>
          <button id="audioBtn" class="icon-btn" title="Control de audio">⚙️</button>
        </div>
        <label class="field-label">Nombre del jugador
          <input id="name" type="text" maxlength="18" placeholder="Jugador" />
        </label>
        <div class="buttons">
          <button id="startBtn" class="btn-start">▶ Start</button>
          <button id="resetBtn" class="secondary">⟲ Reset</button>
          <button id="pauseBtn" class="secondary">⏸ Pausa</button>
        </div>
        <p class="hint">Espacio · P · ESC · ↑↓←→</p>
      </section>

      <!-- PROGRESO -->
      <section class="card" id="progressCard">
        <div class="card-header">
          <h2>Progreso</h2>
          <span id="levelBadge" class="level-badge">Nv —</span>
        </div>
        <div id="themePill" class="theme-pill">—</div>
        <div class="progress-bar-wrap">
          <div id="progressBar" class="progress-bar"></div>
        </div>
        <div class="progress-labels">
          <span id="progressFoods"></span>
          <span id="progressTime"></span>
        </div>
        <div id="activePUCard" class="active-pu" style="display:none"></div>
      </section>

      <!-- ÚLTIMA PARTIDA -->
      <section class="card" id="lastGameCard">
        <div class="card-header">
          <h2>Última partida</h2>
          <span id="lastGameDate" class="muted-small">—</span>
        </div>
        <div class="last-game-stats">
          <div class="stat-box">
            <span class="stat-val" id="lastScore">—</span>
            <span class="stat-lbl">Puntos</span>
          </div>
          <div class="stat-box">
            <span class="stat-val" id="lastLevel">—</span>
            <span class="stat-lbl">Nivel</span>
          </div>
          <div class="stat-box">
            <span class="stat-val" id="lastDur">—</span>
            <span class="stat-lbl">Tiempo</span>
          </div>
        </div>
        <div class="best-row">
          <span class="muted-small">🏆 Mejor sesión</span>
          <span id="bestScore" class="muted-small best-val">— pts</span>
          <span id="bestDur"   class="muted-small best-val">— s</span>
        </div>
      </section>

      <footer class="sidebar-footer">
        <small>Developed by <strong>JuanPariona©</strong> │ 2025</small>
      </footer>
    </aside>

    <main class="stage-wrap">
      <canvas id="stage" width="960" height="960"></canvas>
      <div id="overlay" class="overlay"></div>
      <div id="pad" aria-label="Controles táctiles" role="group">
        <button class="pad-btn" data-dir="up"    aria-label="Arriba">▲</button>
        <div class="pad-row">
          <button class="pad-btn" data-dir="left"  aria-label="Izquierda">◀</button>
          <button class="pad-btn" id="pad-pause"   aria-label="Pausa/Reanudar">⏯</button>
          <button class="pad-btn" data-dir="right" aria-label="Derecha">▶</button>
        </div>
        <button class="pad-btn" data-dir="down"  aria-label="Abajo">▼</button>
      </div>
    </main>
  </div>

  <!-- MODAL AUDIO -->
  <div id="audioModal" class="modal-backdrop" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <span>⚙️ Control de Audio</span>
        <button id="audioClose" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">
          <span>🎵 Música</span>
          <span id="volMusicVal" class="vol-val">35%</span>
        </label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.35" />
        <label class="modal-label" style="margin-top:16px">
          <span>🔊 Efectos</span>
          <span id="volFxVal" class="vol-val">50%</span>
        </label>
        <input id="volumeFx" type="range" min="0" max="1" step="0.01" value="0.5" />
        <button id="muteAll" class="secondary mute-btn">🔇 Silenciar todo</button>
      </div>
    </div>
  </div>

  <audio id="bgm" preload="auto" loop>
    <source src="assets/music.ogg" type="audio/ogg" />
    <source src="assets/music.mp3" type="audio/mpeg" />
  </audio>
  <script defer src="snake.js"></script>
</body>
</html>
